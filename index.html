<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wordly Dictionary</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Manrope:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-shape bg-shape-left" aria-hidden="true"></div>
    <div class="bg-shape bg-shape-right" aria-hidden="true"></div>

    <main class="app-shell" aria-live="polite">
      <header class="app-header">
        <p class="eyebrow">Wordly Lab</p>
        <h1>Interactive Dictionary</h1>
        <p class="subtitle">Search any word to see pronunciation, definitions, examples, and synonyms.</p>
      </header>

      <section class="controls" aria-label="Dictionary search controls">
        <form id="search-form" class="search-form" aria-label="Search for a word">
          <label for="word-input" class="sr-only">Search word</label>
          <input
            id="word-input"
            name="word"
            type="text"
            placeholder="Try: luminous"
            autocomplete="off"
            aria-label="Type a word to search"
            required
          />
          <button type="submit">Search</button>
        </form>

        <div class="control-buttons">
          <button id="theme-toggle" type="button" class="secondary-btn" aria-label="Toggle reading theme">
            Toggle Theme
          </button>
          <button id="save-word" type="button" class="secondary-btn" aria-label="Save current word" disabled>
            Save Word
          </button>
        </div>
      </section>

      <section id="status" class="status hidden" role="status"></section>

      <section id="results" class="results" aria-label="Dictionary results">
        <p class="placeholder">Search to begin. Definitions will appear here without refreshing the page.</p>
      </section>

      <aside class="favorites" aria-label="Saved words">
        <h2>Saved Words</h2>
        <ul id="favorites-list"></ul>
      </aside>
    </main>

    <script type="module" src="index.js"></script>
  </body>
</html>
